<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheetla Public School — Excellence in Education & Values</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --gold: #C9A84C;
  --gold-light: #E8D48B;
  --gold-dark: #8B6914;
  --navy: #0A1628;
  --navy-light: #132242;
  --cream: #FFF8EE;
  --cream-dark: #F0E6D3;
  --maroon: #6B1D2A;
  --white: #FFFFFF;
  --text: #2A2A2A;
  --text-light: #6B6B6B;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
  overflow-x: hidden;
}

/* ===== PRELOADER ===== */
.preloader {
  position: fixed; inset:0; z-index:9999;
  background: var(--navy);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
.preloader.hide { opacity:0; visibility:hidden; }
.preloader-crest {
  width: 80px; height: 80px;
  border: 3px solid var(--gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  animation: crestPulse 1.5s ease-in-out infinite;
}
.preloader-crest span {
  font-family: 'Playfair Display', serif;
  font-size: 32px; font-weight: 900; color: var(--gold);
}
.preloader-text {
  font-family: 'Cormorant Garamond', serif;
  color: var(--gold-light); font-size: 14px; letter-spacing: 6px; text-transform: uppercase;
}
@keyframes crestPulse {
  0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(201,168,76,0.4); }
  50% { transform: scale(1.05); box-shadow: 0 0 30px 10px rgba(201,168,76,0.15); }
}

/* ===== CURSOR GLOW ===== */
.cursor-glow {
  position: fixed; width: 300px; height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 9998;
  transform: translate(-50%, -50%);
  transition: left 0.3s ease, top 0.3s ease;
}

/* ===== NAV ===== */
nav {
  position: fixed; top:0; left:0; right:0; z-index: 1000;
  padding: 18px 50px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(10,22,40,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(201,168,76,0.15);
  transform: translateY(-100%);
  animation: slideDown 0.8s ease 1.8s forwards;
}
@keyframes slideDown { to { transform: translateY(0); } }

.nav-brand {
  display: flex; align-items: center; gap: 14px;
  text-decoration: none;
}
.nav-crest {
  width: 42px; height: 42px;
  border: 2px solid var(--gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-weight: 900; font-size: 18px; color: var(--gold);
}
.nav-name {
  font-family: 'Playfair Display', serif;
  font-size: 18px; color: var(--white); font-weight: 700;
}
.nav-name small {
  display: block; font-family: 'DM Sans', sans-serif;
  font-size: 10px; color: var(--gold-light);
  letter-spacing: 3px; text-transform: uppercase; font-weight: 400;
}

.nav-links { display: flex; gap: 36px; list-style: none; }
.nav-links a {
  color: rgba(255,255,255,0.7); text-decoration: none;
  font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase;
  font-weight: 500; position: relative; transition: color 0.3s;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: -4px; left:0;
  width: 0; height: 1px; background: var(--gold);
  transition: width 0.4s ease;
}
.nav-links a:hover { color: var(--gold); }
.nav-links a:hover::after { width: 100%; }

.nav-cta {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold); padding: 10px 28px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; transition: all 0.4s ease;
  text-decoration: none;
}
.nav-cta:hover {
  background: var(--gold); color: var(--navy);
}

/* ===== HERO ===== */
.hero {
  min-height: 100vh;
  background: var(--navy);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.hero-bg-pattern {
  position: absolute; inset: 0;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(107,29,42,0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(201,168,76,0.05) 0%, transparent 50%);
}
.hero-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
  background-size: 80px 80px;
  animation: gridShift 20s linear infinite;
}
@keyframes gridShift {
  0% { transform: translate(0,0); }
  100% { transform: translate(80px,80px); }
}

.hero-content {
  text-align: center; z-index: 2;
  padding: 0 20px;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.25);
  padding: 8px 24px; border-radius: 40px;
  margin-bottom: 40px;
  opacity: 0; animation: fadeUp 1s ease 2s forwards;
}
.hero-badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold);
  animation: blink 2s ease infinite;
}
@keyframes blink {
  0%,100% { opacity:1; } 50% { opacity:0.3; }
}
.hero-badge span {
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold-light); font-weight: 500;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(42px, 7vw, 96px);
  color: var(--white);
  line-height: 1.05;
  margin-bottom: 10px;
  opacity: 0; animation: fadeUp 1s ease 2.2s forwards;
}
.hero h1 em {
  font-style: italic;
  color: var(--gold);
}
.hero-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(18px, 2.5vw, 28px);
  color: rgba(255,255,255,0.5);
  margin-bottom: 50px;
  opacity: 0; animation: fadeUp 1s ease 2.4s forwards;
}
.hero-buttons {
  display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
  opacity: 0; animation: fadeUp 1s ease 2.6s forwards;
}
.btn-primary {
  background: var(--gold); color: var(--navy);
  padding: 16px 44px; border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; position: relative; overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  text-decoration: none;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 40px rgba(201,168,76,0.3);
}
.btn-secondary {
  background: transparent; color: var(--white);
  padding: 16px 44px;
  border: 1px solid rgba(255,255,255,0.2);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; transition: all 0.3s ease;
  text-decoration: none;
}
.btn-secondary:hover {
  border-color: var(--gold); color: var(--gold);
}

.hero-scroll {
  position: absolute; bottom: 40px; left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  opacity: 0; animation: fadeUp 1s ease 3s forwards;
}
.hero-scroll span {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(255,255,255,0.3);
}
.scroll-line {
  width: 1px; height: 50px;
  background: linear-gradient(to bottom, var(--gold), transparent);
  animation: scrollPulse 2s ease infinite;
}
@keyframes scrollPulse {
  0% { transform: scaleY(0); transform-origin: top; }
  50% { transform: scaleY(1); transform-origin: top; }
  51% { transform: scaleY(1); transform-origin: bottom; }
  100% { transform: scaleY(0); transform-origin: bottom; }
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(30px); }
  to { opacity:1; transform:translateY(0); }
}

/* ===== FLOATING PARTICLES ===== */
.particles {
  position: absolute; inset: 0; pointer-events: none;
}
.particle {
  position: absolute;
  width: 3px; height: 3px;
  background: var(--gold);
  border-radius: 50%;
  opacity: 0;
  animation: float 8s ease-in-out infinite;
}
.particle:nth-child(1) { left:10%; top:20%; animation-delay:0s; }
.particle:nth-child(2) { left:25%; top:70%; animation-delay:1.5s; }
.particle:nth-child(3) { left:55%; top:30%; animation-delay:3s; }
.particle:nth-child(4) { left:75%; top:60%; animation-delay:4.5s; }
.particle:nth-child(5) { left:90%; top:40%; animation-delay:6s; }
.particle:nth-child(6) { left:40%; top:85%; animation-delay:2s; }
@keyframes float {
  0%,100% { opacity:0; transform:translateY(0) scale(1); }
  25% { opacity:0.6; }
  50% { opacity:0.3; transform:translateY(-80px) scale(1.5); }
  75% { opacity:0.5; }
}

/* ===== STATS RIBBON ===== */
.stats-ribbon {
  background: var(--white);
  border-top: 1px solid rgba(201,168,76,0.2);
  border-bottom: 1px solid rgba(201,168,76,0.2);
  padding: 60px 50px;
  display: flex; justify-content: center; gap: 80px; flex-wrap: wrap;
}
.stat-item {
  text-align: center;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.6s ease;
}
.stat-item.visible { opacity:1; transform:translateY(0); }
.stat-number {
  font-family: 'Playfair Display', serif;
  font-size: 52px; font-weight: 900;
  color: var(--navy);
  line-height: 1;
}
.stat-number span { color: var(--gold); }
.stat-label {
  font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--text-light); margin-top: 8px;
}

/* ===== SECTION COMMON ===== */
section { padding: 120px 50px; }
.section-tag {
  display: inline-flex; align-items: center; gap: 10px;
  margin-bottom: 20px;
}
.section-tag-line {
  width: 40px; height: 1px; background: var(--gold);
}
.section-tag span {
  font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--gold-dark); font-weight: 600;
}
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 4vw, 52px);
  color: var(--navy);
  line-height: 1.15;
  margin-bottom: 20px;
}
.section-desc {
  font-size: 16px; color: var(--text-light);
  max-width: 560px; line-height: 1.8;
}

/* ===== ABOUT ===== */
.about {
  background: var(--cream);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px; align-items: center;
}
.about-visual {
  position: relative;
}
.about-image-frame {
  position: relative;
  background: linear-gradient(135deg, var(--navy), var(--navy-light));
  padding: 30px;
  overflow: hidden;
}
.about-image-frame::before {
  content: '';
  position: absolute; top: 15px; left: 15px;
  right: 15px; bottom: 15px;
  border: 1px solid var(--gold);
  opacity: 0.3; z-index: 1;
}
.about-image-frame img {
  width: 100%; display: block;
  filter: sepia(0.15) contrast(1.05);
}
.about-float-badge {
  position: absolute; bottom: -20px; right: -20px;
  background: var(--gold);
  padding: 24px 30px;
  text-align: center;
  z-index: 2;
}
.about-float-badge .big {
  font-family: 'Playfair Display', serif;
  font-size: 36px; font-weight: 900;
  color: var(--navy); line-height: 1;
}
.about-float-badge .small {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--navy); opacity: 0.7;
}
.about-features {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 24px; margin-top: 40px;
}
.about-feature {
  padding: 24px;
  background: var(--white);
  border: 1px solid rgba(201,168,76,0.15);
  transition: all 0.4s ease;
}
.about-feature:hover {
  border-color: var(--gold);
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(201,168,76,0.1);
}
.about-feature-icon {
  font-size: 28px; margin-bottom: 12px;
}
.about-feature h4 {
  font-family: 'Playfair Display', serif;
  font-size: 16px; margin-bottom: 6px;
  color: var(--navy);
}
.about-feature p {
  font-size: 13px; color: var(--text-light); line-height: 1.6;
}

/* ===== PROGRAMS ===== */
.programs { background: var(--navy); color: var(--white); }
.programs .section-tag span { color: var(--gold-light); }
.programs .section-title { color: var(--white); }
.programs .section-desc { color: rgba(255,255,255,0.5); }

.programs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 30px; margin-top: 60px;
}
.program-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 44px 36px;
  position: relative; overflow: hidden;
  transition: all 0.5s ease;
  cursor: default;
}
.program-card::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 100%; height: 3px;
  background: linear-gradient(90deg, var(--gold), transparent);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.5s ease;
}
.program-card:hover::before { transform: scaleX(1); }
.program-card:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(201,168,76,0.2);
  transform: translateY(-6px);
}
.program-icon {
  width: 56px; height: 56px;
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; margin-bottom: 28px;
  border-radius: 4px;
}
.program-card h3 {
  font-family: 'Playfair Display', serif;
  font-size: 22px; margin-bottom: 14px;
}
.program-card p {
  color: rgba(255,255,255,0.45);
  font-size: 14px; line-height: 1.8;
}
.program-tag {
  display: inline-block; margin-top: 20px;
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--gold); border: 1px solid rgba(201,168,76,0.3);
  padding: 6px 16px;
}

/* ===== VALUES ===== */
.values { background: var(--white); text-align: center; }
.values-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 40px; margin-top: 60px;
}
.value-item {
  padding: 40px 24px;
  transition: all 0.4s ease;
}
.value-item:hover { transform: translateY(-6px); }
.value-ring {
  width: 90px; height: 90px; margin: 0 auto 24px;
  border-radius: 50%;
  border: 2px solid rgba(201,168,76,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  transition: all 0.5s ease;
  position: relative;
}
.value-item:hover .value-ring {
  border-color: var(--gold);
  box-shadow: 0 0 40px rgba(201,168,76,0.15);
}
.value-item h4 {
  font-family: 'Playfair Display', serif;
  font-size: 18px; color: var(--navy);
  margin-bottom: 10px;
}
.value-item p {
  font-size: 13px; color: var(--text-light); line-height: 1.7;
}

/* ===== TESTIMONIALS ===== */
.testimonials {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  color: var(--white);
  text-align: center;
}
.testimonials .section-tag span { color: var(--gold-light); }
.testimonials .section-title { color: var(--white); }
.testimonial-slider {
  max-width: 700px; margin: 60px auto 0;
  position: relative;
}
.testimonial-card {
  display: none;
  padding: 50px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  animation: fadeIn 0.6s ease;
}
.testimonial-card.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.testimonial-quote {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-style: italic;
  color: rgba(255,255,255,0.8);
  line-height: 1.7;
  margin-bottom: 30px;
}
.testimonial-quote::before {
  content: '"'; display: block;
  font-family: 'Playfair Display', serif;
  font-size: 60px; color: var(--gold);
  line-height: 1; margin-bottom: 10px;
}
.testimonial-author {
  font-weight: 600; font-size: 14px; letter-spacing: 1px;
}
.testimonial-role {
  font-size: 12px; color: var(--gold-light); margin-top: 4px;
}
.testimonial-dots {
  display: flex; gap: 10px; justify-content: center; margin-top: 30px;
}
.t-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: none; cursor: pointer;
  transition: all 0.3s ease;
}
.t-dot.active { background: var(--gold); transform: scale(1.3); }

/* ===== ADMISSION CTA ===== */
.admission-cta {
  background: var(--cream);
  text-align: center;
  position: relative; overflow: hidden;
}
.admission-cta::before {
  content: '';
  position: absolute; top: -200px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,0.08), transparent 70%);
}
.cta-box {
  position: relative; z-index: 1;
  max-width: 680px; margin: 0 auto;
}
.cta-box .section-title em { color: var(--gold-dark); font-style: italic; }
.cta-box p {
  font-size: 16px; color: var(--text-light);
  line-height: 1.8; margin-bottom: 40px;
}
.cta-info {
  display: flex; justify-content: center; gap: 50px;
  margin-bottom: 40px; flex-wrap: wrap;
}
.cta-info-item {
  display: flex; align-items: center; gap: 10px;
}
.cta-info-item span:first-child { font-size: 20px; }
.cta-info-item span:last-child {
  font-size: 14px; color: var(--text-light);
}

/* ===== GALLERY ===== */
.gallery { background: var(--white); }
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: auto auto;
  gap: 16px; margin-top: 60px;
}
.gallery-item {
  position: relative; overflow: hidden;
  background: var(--navy);
  aspect-ratio: 1;
  cursor: pointer;
}
.gallery-item:first-child {
  grid-column: span 2; grid-row: span 2;
  aspect-ratio: auto;
}
.gallery-item img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.6s ease, filter 0.6s ease;
  filter: sepia(0.1);
}
.gallery-item:hover img {
  transform: scale(1.08);
  filter: sepia(0);
}
.gallery-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(10,22,40,0.8), transparent 50%);
  display: flex; align-items: flex-end; padding: 24px;
  opacity: 0; transition: opacity 0.4s ease;
}
.gallery-item:hover .gallery-overlay { opacity:1; }
.gallery-overlay span {
  color: var(--white); font-family: 'Playfair Display', serif;
  font-size: 16px;
}

/* ===== CONTACT ===== */
.contact {
  background: var(--navy); color: var(--white);
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 80px;
}
.contact .section-tag span { color: var(--gold-light); }
.contact .section-title { color: var(--white); }
.contact .section-desc { color: rgba(255,255,255,0.5); }

.contact-details { margin-top: 50px; display: flex; flex-direction: column; gap: 30px; }
.contact-item {
  display: flex; align-items: flex-start; gap: 20px;
}
.contact-icon {
  width: 50px; height: 50px; flex-shrink: 0;
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.contact-item h4 {
  font-size: 14px; color: var(--gold-light);
  letter-spacing: 1px; margin-bottom: 4px;
}
.contact-item p {
  font-size: 15px; color: rgba(255,255,255,0.7);
  line-height: 1.6;
}

.contact-form { display: flex; flex-direction: column; gap: 24px; margin-top: 40px; }
.form-group { position: relative; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 16px 20px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  transition: border-color 0.3s;
  outline: none;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  border-color: var(--gold);
}
.form-group textarea { resize: vertical; min-height: 120px; }
.form-group select option { background: var(--navy); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
